<svg xmlns="http://www.w3.org/2000/svg" width="480" height="160" viewBox="0 0 480 160" role="img">
<title>Wachusett Waste Co.</title>
<desc>Logo for Wachusett Waste Co. junk removal, North Central Massachusetts</desc>

<rect width="480" height="160" rx="8" fill="#0F0F0F"/>

<!-- W mark -->
<g transform="translate(24, 44)">
  <rect x="0" y="0" width="72" height="72" rx="8" fill="#0D2E24"/>
  <polyline points="12,16 22,52 36,28 50,52 60,16" fill="none" stroke="#22A87E" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="12" cy="16" r="3" fill="#22A87E"/>
  <circle cx="60" cy="16" r="3" fill="#22A87E"/>
</g>

<!-- Wordmark -->
<text x="116" y="88" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="32" font-weight="700" letter-spacing="-0.02em" fill="#F5F5F5">Wachusett</text>
<text x="116" y="124" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="32" font-weight="700" letter-spacing="-0.02em" fill="#22A87E">Waste<tspan font-weight="400" fill="#666666"> Co.</tspan></text>

<!-- Rule -->
<line x1="116" y1="136" x2="450" y2="136" stroke="#2A2A2A" stroke-width="1"/>
<line x1="116" y1="136" x2="156" y2="136" stroke="#1A7A5E" stroke-width="1.5"/>

<!-- Tagline -->
<text x="116" y="152" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="10" font-weight="500" letter-spacing="0.14em" fill="#555555">NORTH CENTRAL MASSACHUSETTS</text>

</svg>
